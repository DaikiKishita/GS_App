<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>食費登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-3" style="max-width: 420px;">

    <!-- タイトル -->
    <h5 class="text-center mb-3">➕ 食費登録</h5>

    <form method="post" action="/record/register" class="card shadow-sm p-3">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <!-- カテゴリ -->
        <div class="mb-3">
            <label class="form-label small text-muted">カテゴリ</label>
            <select name="categoryId"
                    class="form-select form-select-lg"
                    required>
                <option value="">選択してください</option>
                <option
                    th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
                </option>
            </select>
        </div>

        <!-- 金額 -->
        <div class="mb-3">
            <label class="form-label small text-muted">金額（円）</label>
            <input type="number"
                   name="amount"
                   class="form-control form-control-lg"
                   placeholder="例：500"
                   required>
        </div>

        <!-- 日付 -->
        <div class="mb-3">
            <label class="form-label small text-muted">日付</label>
            <input type="date"
                   name="recordDate"
                   class="form-control form-control-lg"
                   th:value="${today}"
                   required>
        </div>

        <!-- メモ -->
        <div class="mb-4">
            <label class="form-label small text-muted">メモ（任意）</label>
            <textarea name="memo"
                      rows="3"
                      class="form-control"
                      placeholder="例：スーパーで買い物"></textarea>
        </div>

        <!-- 登録ボタン -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
                登録する
            </button>
        </div>
    </form>
    <div class="text-center my-1">
        <a href="/home" class="text-center fs-6">戻る</a>
    </div>

</div>

</body>
</html>
