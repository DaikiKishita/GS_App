<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>食費管理アプリ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="bg-light">

<div class="container py-3">

    <!-- タイトル -->
    <h4 class="text-center mb-3">🍽 食費管理</h4>

    <!-- ===== 上部サマリー ===== -->
    <div class="row g-2 mb-3">

        <div class="col-6">
            <div class="card text-center shadow-sm">
                <div class="card-body p-2">
                    <small class="text-muted">今月の目標</small>
                    <div class="fs-4 fw-bold text-primary">
                        ¥<span th:text="${objective?.amount ?: 0}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6" id="monthTotal">
            <div class="card text-center shadow-sm">
                <div class="card-body p-2">
                    <small class="text-muted">今月の合計</small>
                    <div class="fs-4 fw-bold text-danger">
                        ¥<span th:text="${monthTotal ?: 0}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-center shadow-sm">
                <div class="card-body p-2">
                    <small class="text-muted">使用可能金額</small>
                    <div class="fs-4 fw-bold text-success">
                        ¥<span th:text="${dailyAverage ?: 0}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- <div class="col-6">
            <div class="card text-center shadow-sm">
                <div class="card-body p-2">
                    <small class="text-muted">本日使用金額</small>
                    <div class="fs-4 fw-bold text-warning">
                        ¥<span th:text="${used ?: 0}"></span>
                    </div>
                </div>
            </div>
        </div> -->

    </div>

    <!-- ===== 食費登録ボタン ===== -->
    <div class="d-grid mb-4">
        <a href="/record/register" class="btn btn-primary btn-lg">
            ➕ 食費を登録する
        </a>
    </div>

    <!-- ===== 本日の履歴 ===== -->
    <h6 class="mb-2">
        <input type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"/>
        <input type="date"
        id="records_date"
        class="form-control"
        th:value="${selectedDate}">
    </h6>
    <div class="list-group">
        <div class="list-group-item"
            th:each="record : ${records}">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold" th:text="${record.category.name}">食料品</div>
                    <small class="text-muted" th:text="${record.memo}">メモ</small>
                </div>

                <div class="text-end">
                    <div class="fw-bold text-danger">
                        ¥<span th:text="${record.amount}"></span>
                    </div>

                    <form th:action="@{/record/delete}" method="post">
                        <input type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"/>

                        <input type="hidden" name="recordId"
                            th:value="${record.id}"/>

                        <input type="hidden" name="date"
                            th:value="${selectedDate}"/>

                        <button
                            type="button"
                            class="btn btn-sm btn-outline-danger mt-1"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteModal"
                            th:data-record-id="${record.id}"
                            th:data-date="${selectedDate}">
                            🗑 削除
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="text-center text-muted py-3"
            th:if="${#lists.isEmpty(records)}">
            今日の記録はまだありません
        </div>
    </div>
</div>

<!-- 削除用モーダル -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">削除確認</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p class="mb-0 text-danger">
          この食費記録を削除します。<br>
          本当によろしいですか？
        </p>
      </div>

      <div class="modal-footer">
        <button type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal">
          キャンセル
        </button>

        <form id="deleteForm" th:action="@{/record/delete}" method="post">
          <input type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}"/>

          <input type="hidden" name="recordId" id="modalRecordId">
          <input type="hidden" name="date" id="modalDate">

          <button type="submit" class="btn btn-danger">
            削除する
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
const recordDate = document.getElementById("records_date");
const monthTotal = document.getElementById("monthTotal");

monthTotal.addEventListener("click",() =>{
    window.location.href="/record/summary";
})

recordDate.addEventListener("change", () => {
    const date = recordDate.value;
    if (date) {
        window.location.href = `/home?date=${date}`;
    }
});

const deleteModal = document.getElementById("deleteModal");

deleteModal.addEventListener("show.bs.modal", event => {
    const button = event.relatedTarget;

    const recordId = button.getAttribute("data-record-id");
    const date = button.getAttribute("data-date");

    document.getElementById("modalRecordId").value = recordId;
    document.getElementById("modalDate").value = date;
});
</script>
</body>
</html>
