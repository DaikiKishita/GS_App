services: 
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

  app:
    build: .
    image: groceries-management
    container_name: app
    ports:
      - "8080"
    depends_on:
      - db
    volumes:
      - ./app:/workspace
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/gsdb
      SPRING_DATASOURCE_USERNAME: gs
      SPRING_DATASOURCE_PASSWORD: gs

  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE: gsdb
      MYSQL_USER: gs
      MYSQL_PASSWORD: gs
      MYSQL_ROOT_PASSWORD: root
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_ja_0900_as_cs
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
