<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>月次集計</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-3">

    <!-- 🔙 戻る -->
    <div class="text-center mb-4">
        <a href="/home" class="btn btn-success px-4">
            戻る
        </a>
    </div>

    <!-- ===== 本日の履歴 ===== -->
    <h6 class="mb-2">
        <input type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"/>
        <input type="month"
        id="records_date"
        class="form-control"
        th:value="${selectedDate}">
    </h6>

    <div class="col">
        <div class="card text-center shadow-sm">
            <div class="card-body p-2">
                <small class="text-muted">今月の合計</small>
                <div class="fs-4 fw-bold text-danger">
                    ¥<span th:text="${monthTotal ?: 0}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class ="list-group">
        <div class="list-group-item container"
            th:each="record:${records}">
            <div>
                <div class="fw-bold" th:text="${record.categoryName}"></div>
            </div>
            <div class="text-end">
                <div class="fw-bold text-danger">
                    ￥<span th:text="${record.amount}"></span>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
const recordDate = document.getElementById("records_date");

recordDate.addEventListener("change", () => {
    const date = recordDate.value;
    if (date) {
        window.location.href = `/record/summary?date=${date}`;
    }
});

const deleteModal = document.getElementById("deleteModal");

deleteModal.addEventListener("show.bs.modal", event => {
    const button = event.relatedTarget;

    const recordId = button.getAttribute("data-record-id");
    const date = button.getAttribute("data-date");

    document.getElementById("modalRecordId").value = recordId;
    document.getElementById("modalDate").value = date;
});
</script>

</body>
</html>
